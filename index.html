<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cadu — Healthcare Financing Marketplace</title>
    <!-- BEGIN blog-post-meta: injected before React for crawler visibility -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get("post");
        if (!slug) return;

        function setMeta(attr, key, val) {
          var el = document.querySelector('meta[' + attr + '="' + key + '"]');
          if (!el) { el = document.createElement('meta'); el.setAttribute(attr, key); document.head.appendChild(el); }
          el.setAttribute('content', val);
        }

        function applyMeta(title, description) {
          document.title = title + " | Cadu";
          setMeta('name', 'description', description);
          setMeta('property', 'og:title', title);
          setMeta('property', 'og:description', description);
          setMeta('property', 'og:url', window.location.href);
          setMeta('property', 'og:type', 'article');
          setMeta('name', 'twitter:title', title);
          setMeta('name', 'twitter:description', description);
          setMeta('name', 'twitter:card', 'summary_large_image');
        }

        // Synchronous XHR so meta is set before page renders (works for crawlers that run JS)
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('POST', 'https://api.base44.com/api/apps/699ddfc1277ab7410d96d61c/functions/blogMeta', false);
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.setRequestHeader('Accept', 'application/json');
          xhr.send(JSON.stringify({ slug: slug }));
          if (xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            if (data.title) applyMeta(data.title, data.description || '');
          }
        } catch(e) {}
      })();
    </script>
    <!-- END blog-post-meta -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
